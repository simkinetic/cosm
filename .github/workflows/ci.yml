name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main
      - name: Vet
        run: go vet ./...
      - name: Test + coverage gate
        run: bash scripts/coverage.sh

  build:
    name: Build binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build cosm + extensions
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          v="${GITHUB_REF_NAME}"
          suffix="${GOOS}-${GOARCH}"
          mkdir -p out
          go build -ldflags "-X main.version=${v}" -o "out/cosm-${suffix}" .
          go build -o "out/cosm-ext-lua-${suffix}" ./cmd/cosm-ext-lua
          go build -o "out/cosm-ext-cmake-${suffix}" ./cmd/cosm-ext-cmake
      - uses: actions/upload-artifact@v4
        with:
          name: cosm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -l dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
